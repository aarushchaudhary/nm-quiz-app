<!DOCTYPE html>
<html>
<head>
    <title>Exit</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #exit-button {
            padding: 8px 25px;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            background-color: #e74c3c;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        body:hover #exit-button {
            opacity: 1;
        }
    </style>
</head>
<body>
    <button id="exit-button">Exit Application</button>

    <script>
        const exitButton = document.getElementById('exit-button');
        
        exitButton.addEventListener('click', () => {
            if (window.electronAPI) {
                window.electronAPI.requestQuit();
            }
        });

        // --- NEW: Send events to main process when mouse enters/leaves the button ---
        exitButton.addEventListener('mouseenter', () => {
            if (window.electronAPI) {
                window.electronAPI.mouseEnterButton();
            }
        });

        exitButton.addEventListener('mouseleave', () => {
            if (window.electronAPI) {
                window.electronAPI.mouseLeaveButton();
            }
        });
    </script>
</body>
</html>
